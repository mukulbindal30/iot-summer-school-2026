name: Count Arduino Files

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  count-ino:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Count .ino files
      run: |
        python -c "
        import pathlib
        
        ino_files = list(pathlib.Path('.').rglob('*.ino'))
        count = len(ino_files)
        
        print('=' * 40)
        print(f'Total .ino files found: {count}')
        print('=' * 40)
        
        if count > 0:
            print('Files found:')
            for file in ino_files:
                print(f' - {file}')
        "
